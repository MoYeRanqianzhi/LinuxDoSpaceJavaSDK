name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release, for example v0.1.0-alpha.1
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: java-release
  cancel-in-progress: false

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Resolve metadata
        id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          release_tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            release_tag="${INPUT_TAG}"
          fi
          echo "release_tag=${release_tag}" >>"$GITHUB_OUTPUT"
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import xml.etree.ElementTree as ET

          ns = {"m": "http://maven.apache.org/POM/4.0.0"}
          root = ET.parse("pom.xml").getroot()
          version = root.find("m:version", ns)
          if version is None or not version.text:
            raise SystemExit("could not read pom version")
          print(f"package_version={version.text.strip()}")
          PY

      - name: Validate tag matches package version
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          PACKAGE_VERSION: ${{ steps.meta.outputs.package_version }}
        run: |
          expected_tag="v${PACKAGE_VERSION}"
          if [ "${RELEASE_TAG}" != "${expected_tag}" ]; then
            echo "::error::Release tag ${RELEASE_TAG} does not match package version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Build package
        run: mvn -B -ntp -DskipTests package

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp target/*.jar release-artifacts/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-artifacts
          path: release-artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release-artifacts/* --clobber
          else
            gh release create "${RELEASE_TAG}" release-artifacts/* --generate-notes --title "${RELEASE_TAG}"
          fi
